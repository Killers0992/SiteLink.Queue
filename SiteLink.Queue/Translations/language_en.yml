# Queue plugin translations.
queue_text: |-
  <color=orange>{queue_server}</color> <color=white>is full</color>
  <color=white>You are </color><color=orange>{queue_position_ordinal}</color><color=white> in the queue</color>

  <color=orange>{alt_server}</color> <color=white>has </color><color=orange>{alt_online}/{alt_max}</color><color=white> players online</color>
  <color=white>Press </color><color=orange>[ALT]</color><color=white> to connect</color>

# Placeholders: none. Used by {queue_count} when no players are waiting.
queue_count_empty: ''

# Placeholders: {queue_length}
queue_count: '+{queue_length} in queue'

# Placeholders: {user_id}, {server}, {server_name}, {queue_position}
added_to_queue_log: 'Added {user_id} to the {server_name} queue at position {queue_position}.'

# Placeholders: none.
null_session_log: 'Failed to remove a player from the queue because the session was null.'
